<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1A1A1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inspección">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Inspección Visual – GFST-SUPC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #F5F3EE; font-family: -apple-system, 'Segoe UI', Arial, sans-serif; font-size: 14px; color: #1A1A1A; }
  input, select, textarea, button { font-family: inherit; font-size: 14px; }

  /* Header */
  #app-header { background: #1A1A1A; color: #fff; padding: 14px 16px; position: sticky; top: 0; z-index: 100; }
  #app-header .eyebrow { font-size: 11px; color: #E8620A; font-weight: 700; letter-spacing: .08em; margin-bottom: 2px; }
  #app-header h1 { font-size: 17px; font-weight: 700; }
  #app-header .sub { font-size: 11px; color: #9CA3AF; margin-top: 2px; }

  /* Save indicator */
  #save-indicator { font-size: 11px; color: #6B7280; text-align: right; padding: 4px 16px; background: #fff; border-bottom: 1px solid #E5E7EB; }
  #save-indicator.saved { color: #1D7A3A; }

  /* Meta */
  #meta-section { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 12px 16px; }
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

  /* Tabs */
  #tabs { display: flex; background: #fff; border-bottom: 2px solid #E5E7EB; }
  .tab-btn { flex: 1; padding: 11px 0; border: none; cursor: pointer; font-weight: 700; font-size: 13px; background: #F5F3EE; color: #6B7280; border-bottom: 3px solid transparent; }
  .tab-btn.active { background: #fff; color: #E8620A; border-bottom-color: #E8620A; }

  /* Main content */
  #main { padding: 14px 12px; max-width: 680px; margin: 0 auto; }

  /* Labels / inputs */
  .lbl { font-size: 11px; font-weight: 700; color: #6B7280; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
  .inp { width: 100%; border: 1.5px solid #D1D5DB; border-radius: 6px; padding: 7px 10px; font-size: 13px; background: #fff; }
  .inp:focus { outline: none; border-color: #E8620A; }
  textarea.inp { resize: vertical; }

  /* Cards */
  .equipo-card { background: #fff; border-radius: 10px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; cursor: pointer; }
  .card-num { border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .card-title { font-weight: 700; font-size: 14px; }
  .card-codes { font-weight: 400; color: #6B7280; font-size: 12px; margin-left: 6px; }
  .card-estado { font-size: 12px; font-weight: 600; margin-top: 1px; }
  .card-body { padding: 12px 14px; border-top: 1px solid #eee; }
  .card-chevron { font-size: 16px; color: #9CA3AF; }

  /* Selector botones táctiles */
  .selector { display: flex; flex-wrap: wrap; gap: 6px; }
  .sel-btn { padding: 7px 12px; border-radius: 6px; border: 2px solid #D1D5DB; background: #fff; color: #374151; font-size: 13px; cursor: pointer; font-weight: 400; transition: all .12s; }
  .sel-btn.active { color: #fff; font-weight: 700; }

  /* Bloque códigos */
  .cod-block { border: 1.5px solid #E5E7EB; border-radius: 8px; margin-bottom: 14px; overflow: hidden; }
  .cod-header { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; cursor: pointer; }
  .cod-body { padding: 10px 12px; border-top: 1px solid #E5E7EB; }
  .cod-field { margin-bottom: 9px; }
  .sin-cod-label { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; cursor: pointer; padding: 8px 10px; border-radius: 7px; border: 1.5px solid #E5E7EB; background: #fff; }
  .sin-cod-label.active { border-color: #FCA5A5; background: #FEF2F2; }

  /* Descripción auto */
  .desc-auto { background: #F0FDF4; border: 1px solid #86EFAC; border-radius: 7px; padding: 9px 12px; margin-bottom: 10px; }
  .desc-auto .lbl2 { font-size: 11px; font-weight: 700; color: #166534; margin-bottom: 3px; }
  .desc-auto p { font-size: 13px; color: #14532D; }

  /* Estado box */
  .estado-box { border-radius: 7px; padding: 9px 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .estado-box .estado-lbl { font-size: 11px; font-weight: 700; }
  .estado-box .estado-val { font-size: 14px; font-weight: 700; }
  .estado-box .estado-concl { font-size: 12px; color: #374151; max-width: 55%; text-align: right; }

  /* Resumen */
  .resumen-stat { display: flex; align-items: center; justify-content: space-between; background: #fff; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; }
  .resumen-badge { border-radius: 20px; padding: 2px 12px; font-weight: 700; font-size: 15px; color: #fff; }
  .hallazgo-item { background: #fff; border-radius: 0 8px 8px 0; padding: 9px 12px; margin-bottom: 8px; font-size: 13px; }

  /* Botones acción */
  .btn-add { width: 100%; padding: 12px; border: 2px dashed #D1D5DB; border-radius: 10px; background: none; color: #6B7280; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 14px; }
  .btn-export { width: 100%; padding: 14px; background: #1D7A3A; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; letter-spacing: .02em; }
  .btn-export:disabled { background: #D1D5DB; cursor: not-allowed; }
  .btn-del { background: none; border: 1px solid #FCA5A5; color: #B91C1C; border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer; }
  .export-hint { font-size: 11px; color: #9CA3AF; text-align: center; margin-top: 6px; }

  /* Grid tipo+ubic */
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .mb12 { margin-bottom: 12px; }
  .mb14 { margin-bottom: 14px; }

  /* Resumen hallazgos título */
  .hallazgos-title { font-weight: 700; font-size: 13px; color: #374151; margin-bottom: 8px; margin-top: 16px; }

  /* Install banner */
  #install-banner { display: none; background: #1A1A1A; color: #fff; padding: 10px 16px; align-items: center; justify-content: space-between; gap: 10px; }
  #install-banner p { font-size: 12px; line-height: 1.4; }
  #install-banner button { background: #E8620A; color: #fff; border: none; border-radius: 6px; padding: 7px 14px; font-weight: 700; font-size: 13px; cursor: pointer; white-space: nowrap; }
  #install-banner .dismiss { background: none; border: none; color: #9CA3AF; font-size: 18px; cursor: pointer; padding: 0 4px; }
</style>
</head>
<body>

<div id="app-header">
  <div class="eyebrow">PERUPETRO S.A. · GFST-SUPC</div>
  <h1>Inspección Visual de Activos</h1>
  <div class="sub">Checklist supervisión de campo</div>
</div>

<div id="install-banner">
  <p>📲 Instala la app para usarla offline desde tu celular</p>
  <button id="install-btn">Instalar</button>
  <button class="dismiss" id="dismiss-install">✕</button>
</div>

<div id="save-indicator">Cargando datos...</div>

<div id="meta-section">
  <div class="meta-grid">
    <div>
      <label class="lbl">Fecha</label>
      <input type="date" id="meta-fecha" class="inp">
    </div>
    <div>
      <label class="lbl">Lote / Área</label>
      <input type="text" id="meta-lote" class="inp" placeholder="Z-69, Lote X...">
    </div>
  </div>
  <div>
    <label class="lbl">Inspector / Supervisor</label>
    <input type="text" id="meta-inspector" class="inp" placeholder="Nombre y CIP">
  </div>
</div>

<div id="tabs">
  <button class="tab-btn active" data-tab="formulario" id="tab-formulario">📋 Checklist (0)</button>
  <button class="tab-btn" data-tab="resumen" id="tab-resumen">📊 Resumen</button>
</div>

<div id="main">
  <div id="view-formulario">
    <div id="cards-container"></div>
    <button class="btn-add" id="btn-add">+ Agregar equipo</button>
  </div>
  <div id="view-resumen" style="display:none"></div>
  <button class="btn-export" id="btn-export" disabled>⬇ Exportar a Excel / CSV (0 equipos)</button>
  <div class="export-hint">Abre el .csv en Excel · incluye descripción automática y conclusión</div>
</div>

<script>
// ─────────────────────────────────────────────
// DATOS
// ─────────────────────────────────────────────
const OPCIONES = {
  tipo: ["Bomba","Tanque","Línea","Válvula","Colector","Plataforma","Pozo","Otro"],
  cond_operacional: [
    {v:"en servicio",                   label:"En servicio",        color:"#1D7A3A"},
    {v:"fuera de servicio temporal",    label:"FDS temporal",       color:"#D4A017"},
    {v:"fuera de servicio permanente",  label:"FDS permanente",     color:"#E8620A"},
    {v:"abandonado / sin uso aparente", label:"Abandonado",         color:"#6B7280"},
    {v:"chatarra / para baja",          label:"Chatarra / Baja",    color:"#B91C1C"},
  ],
  condicion: [
    {v:"en condiciones normales",   label:"Normal",     color:"#1D7A3A"},
    {v:"en condición aceptable",    label:"Aceptable",  color:"#2563EB"},
    {v:"en condición regular",      label:"Regular",    color:"#D4A017"},
    {v:"en condición deficiente",   label:"Deficiente", color:"#B91C1C"},
  ],
  fugas: [
    {v:"sin presencia de fugas",    label:"Sin fugas",        color:"#1D7A3A"},
    {v:"con manchas antiguas",      label:"Manchas antiguas", color:"#2563EB"},
    {v:"con humedad localizada",    label:"Humedad",          color:"#D4A017"},
    {v:"con fuga leve",             label:"Fuga leve",        color:"#E8620A"},
    {v:"con fuga activa visible",   label:"Fuga activa",      color:"#B91C1C"},
  ],
  integridad: [
    {v:"sin corrosión",             label:"Sin corrosión",      color:"#1D7A3A"},
    {v:"con corrosión superficial", label:"Corrosión leve",     color:"#D4A017"},
    {v:"con corrosión moderada",    label:"Corrosión moderada", color:"#E8620A"},
    {v:"con corrosión severa",      label:"Corrosión severa",   color:"#B91C1C"},
    {v:"con deformación evidente",  label:"Deformación",        color:"#B91C1C"},
  ],
  componentes: [
    {v:"componentes íntegros",      label:"Íntegros",       color:"#1D7A3A"},
    {v:"con desgaste menor",        label:"Desgaste menor", color:"#2563EB"},
    {v:"parcialmente deteriorados", label:"Deteriorados",   color:"#E8620A"},
    {v:"componentes dañados",       label:"Dañados",        color:"#B91C1C"},
  ],
  area: [
    {v:"área limpia",           label:"Limpia",         color:"#1D7A3A"},
    {v:"suciedad superficial",  label:"Suciedad leve",  color:"#D4A017"},
    {v:"presencia de residuos", label:"Residuos",       color:"#E8620A"},
    {v:"derrame visible",       label:"Derrame",        color:"#B91C1C"},
  ],
  operacion: [
    {v:"operando normalmente",    label:"Normal",             color:"#1D7A3A"},
    {v:"con ruido atípico",       label:"Ruido atípico",      color:"#D4A017"},
    {v:"con vibración leve",      label:"Vibración leve",     color:"#E8620A"},
    {v:"con vibración excesiva",  label:"Vibración excesiva", color:"#B91C1C"},
    {v:"sin operación",           label:"Sin operación",      color:"#6B7280"},
  ],
};

const SISTEMAS_CODIGO = [
  {key:"cod_tag",       label:"TAG Manual",  hint:"Ej: BOM-001"},
  {key:"cod_perupetro", label:"PERUPETRO",   hint:"Cód. PERUPETRO"},
  {key:"cod_petroperu", label:"PETROPERÚ",   hint:"Cód. PETROPERÚ"},
  {key:"cod_savia2022", label:"SAVIA 2022",  hint:"Cód. Savia 2022"},
  {key:"cod_savia2023", label:"SAVIA 2023",  hint:"Cód. Savia 2023"},
];

const CRITICIDAD = {
  condicion:    {"en condiciones normales":0,"en condición aceptable":1,"en condición regular":2,"en condición deficiente":3},
  fugas:        {"sin presencia de fugas":0,"con manchas antiguas":1,"con humedad localizada":2,"con fuga leve":3,"con fuga activa visible":4},
  integridad:   {"sin corrosión":0,"con corrosión superficial":1,"con corrosión moderada":2,"con corrosión severa":3,"con deformación evidente":3},
  componentes:  {"componentes íntegros":0,"con desgaste menor":1,"parcialmente deteriorados":2,"componentes dañados":3},
  area:         {"área limpia":0,"suciedad superficial":1,"presencia de residuos":2,"derrame visible":3},
  operacion:    {"operando normalmente":0,"sin operación":1,"con ruido atípico":2,"con vibración leve":2,"con vibración excesiva":3},
};

const COLORES_ESTADO = {
  "Operativo normal":           "#1D7A3A",
  "Operativo con observaciones":"#2563EB",
  "Operativo con mantenimiento":"#D4A017",
  "Operativo con restricción":  "#E8620A",
  "FDS temporal":               "#E8620A",
  "Inoperativo":                "#B91C1C",
  "Inoperativo (permanente)":   "#B91C1C",
  "Abandonado":                 "#6B7280",
  "Para baja / Chatarra":       "#1A1A1A",
};

function calcularEstado(item) {
  const co = item.cond_operacional;
  if (co === "chatarra / para baja")          return {estado:"Para baja / Chatarra",       color:"#1A1A1A", conclusion:"Equipo propuesto para baja o disposición final."};
  if (co === "abandonado / sin uso aparente") return {estado:"Abandonado",                 color:"#6B7280", conclusion:"Equipo sin uso aparente. Requiere decisión de gestión."};
  if (co === "fuera de servicio permanente")  return {estado:"Inoperativo (permanente)",   color:"#B91C1C", conclusion:"Equipo fuera de servicio de forma permanente."};
  if (co === "fuera de servicio temporal")    return {estado:"FDS temporal",               color:"#E8620A", conclusion:"Equipo fuera de servicio temporalmente. Verificar plan de retorno."};
  const scores = ["condicion","fugas","integridad","componentes","area","operacion"].map(k => CRITICIDAD[k][item[k]] ?? 0);
  const max = Math.max(...scores);
  if (max === 0) return {estado:"Operativo normal",           color:"#1D7A3A", conclusion:"Equipo en condiciones operativas normales."};
  if (max === 1) return {estado:"Operativo con observaciones",color:"#2563EB", conclusion:"Requiere monitoreo."};
  if (max === 2) return {estado:"Operativo con mantenimiento",color:"#D4A017", conclusion:"Requiere intervención programada."};
  if (max === 3) return {estado:"Operativo con restricción",  color:"#E8620A", conclusion:"Requiere intervención a corto plazo."};
  return {estado:"Inoperativo", color:"#B91C1C", conclusion:"Equipo fuera de servicio por condiciones detectadas."};
}

function generarDescripcion(item) {
  if (!item.tipo) return "";
  const codRef = SISTEMAS_CODIGO.map(s => item[s.key] ? `${s.label} ${item[s.key]}` : "").filter(Boolean);
  const refStr = codRef.length ? ` (${codRef.join(" / ")})` : item.sin_codigo ? " (sin código identificado)" : "";
  const condOp = item.cond_operacional ? ` [${item.cond_operacional}]` : "";
  const partes = ["condicion","fugas","integridad","componentes","area","operacion"].map(k => item[k]).filter(Boolean);
  return `${item.tipo}${refStr}${condOp} inspeccionado ${partes.join(", ")}.`;
}

function resumenCodigos(item) {
  if (item.sin_codigo) return "Sin códigos identificados";
  const encontrados = SISTEMAS_CODIGO.filter(s => item[s.key]).map(s => `${s.label}: ${item[s.key]}`);
  return encontrados.length ? encontrados.join(" · ") : null;
}

function nuevoItem() {
  return {
    id: Date.now(),
    tipo:"", ubicacion:"", cond_operacional:"",
    cod_tag:"", cod_perupetro:"", cod_petroperu:"", cod_savia2022:"", cod_savia2023:"",
    sin_codigo: false,
    condicion:"", fugas:"", integridad:"", componentes:"", area:"", operacion:"",
    observaciones:"",
    _codsOpen: false,
  };
}

// ─────────────────────────────────────────────
// ESTADO GLOBAL
// ─────────────────────────────────────────────
const LS_KEY = "inspeccion_perupetro_v1";
let STATE = { meta: { fecha: new Date().toISOString().slice(0,10), lote:"", inspector:"" }, items: [] };
let vistaActual = "formulario";
let saveTimer = null;

function cargarEstado() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) { STATE = JSON.parse(raw); }
  } catch(e) {}
  if (!STATE.items || STATE.items.length === 0) STATE.items = [nuevoItem()];
}

function guardarEstado() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify(STATE));
      const ind = document.getElementById("save-indicator");
      ind.textContent = "✓ Guardado · " + new Date().toLocaleTimeString("es-PE", {hour:"2-digit", minute:"2-digit"});
      ind.className = "saved";
    } catch(e) {}
  }, 400);
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function renderAll() {
  renderMeta();
  renderCards();
  renderResumen();
  actualizarTabs();
  actualizarExport();
}

function renderMeta() {
  document.getElementById("meta-fecha").value = STATE.meta.fecha || "";
  document.getElementById("meta-lote").value = STATE.meta.lote || "";
  document.getElementById("meta-inspector").value = STATE.meta.inspector || "";
}

function actualizarTabs() {
  const total = STATE.items.filter(it => it.tipo).length;
  document.getElementById("tab-formulario").textContent = `📋 Checklist (${total})`;
}

function actualizarExport() {
  const total = STATE.items.filter(it => it.tipo).length;
  const btn = document.getElementById("btn-export");
  btn.disabled = total === 0;
  btn.textContent = `⬇ Exportar a Excel / CSV (${total} equipos)`;
}

// ── Selector botones ──────────────────────────
function selectorHTML(campo, opciones, valorActual, itemId) {
  return opciones.map(op => {
    const sel = valorActual === op.v;
    const style = sel
      ? `background:${op.color};border-color:${op.color};color:#fff;font-weight:700;`
      : `background:#fff;border-color:#D1D5DB;color:#374151;`;
    return `<button class="sel-btn${sel?' active':''}" style="${style}" 
      onclick="setItemField('${itemId}','${campo}','${sel ? '' : op.v.replace(/'/g,"\\'")}')">
      ${op.label}</button>`;
  }).join("");
}

// ── Card individual ──────────────────────────
function cardHTML(item, idx) {
  const r = calcularEstado(item);
  const codResumen = resumenCodigos(item);
  const desc = generarDescripcion(item);
  const codsOpen = item._codsOpen || false;
  const codBg = item.sin_codigo ? "#FEF2F2" : codResumen ? "#F0FDF4" : "#F9FAFB";
  const codPreview = !codsOpen && codResumen
    ? `<span style="font-size:11px;color:#6B7280;font-style:italic">· ${codResumen.length>38?codResumen.slice(0,38)+"…":codResumen}</span>`
    : !codsOpen
    ? `<span style="font-size:11px;color:#9CA3AF">· Toca para registrar</span>`
    : "";

  const codsBodyHTML = codsOpen ? `
    <div class="cod-body">
      <label class="sin-cod-label${item.sin_codigo?' active':''}">
        <input type="checkbox" ${item.sin_codigo?'checked':''} 
          style="width:16px;height:16px;accent-color:#B91C1C;cursor:pointer"
          onchange="toggleSinCodigo('${item.id}')">
        <span style="font-size:13px;font-weight:600;color:${item.sin_codigo?'#B91C1C':'#374151'}">No se observa código / ilegible</span>
      </label>
      ${!item.sin_codigo ? SISTEMAS_CODIGO.map(s => `
        <div class="cod-field">
          <label class="lbl">${s.label}</label>
          <input class="inp" type="text" value="${(item[s.key]||'').replace(/"/g,'&quot;')}"
            placeholder="${s.hint}"
            oninput="setItemField('${item.id}','${s.key}',this.value)">
        </div>`).join("") : `<p style="font-size:12px;color:#B91C1C;font-style:italic">Se registrará: "Sin códigos identificados en campo"</p>`}
    </div>` : "";

  return `
  <div class="equipo-card" id="card-${item.id}" style="border:2px solid ${r.color}">
    <div class="card-header" style="background:${r.color}18" onclick="toggleCard('${item.id}')">
      <div style="display:flex;align-items:center;gap:10px;overflow:hidden">
        <span class="card-num" style="background:${r.color}">${idx+1}</span>
        <div style="overflow:hidden">
          <div class="card-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
            ${item.tipo||"Equipo sin definir"}
            ${codResumen?`<span class="card-codes">· ${codResumen.length>30?codResumen.slice(0,30)+"…":codResumen}</span>`:""}
          </div>
          <div class="card-estado" style="color:${r.color}">${r.estado}</div>
        </div>
      </div>
      <span class="card-chevron">▼</span>
    </div>
    <div class="card-body" id="body-${item.id}">
      <div class="row2">
        <div>
          <label class="lbl">Tipo de equipo</label>
          <select class="inp" onchange="setItemField('${item.id}','tipo',this.value)">
            <option value="">— Seleccionar —</option>
            ${OPCIONES.tipo.map(t=>`<option ${item.tipo===t?'selected':''}>${t}</option>`).join("")}
          </select>
        </div>
        <div>
          <label class="lbl">Ubicación</label>
          <input class="inp" type="text" value="${(item.ubicacion||'').replace(/"/g,'&quot;')}"
            placeholder="Plataforma, área..." oninput="setItemField('${item.id}','ubicacion',this.value)">
        </div>
      </div>

      <div class="cod-block">
        <div class="cod-header" style="background:${codBg}" onclick="toggleCods('${item.id}')">
          <div style="display:flex;align-items:center;gap:8px">
            <span>🏷</span>
            <span style="font-size:12px;font-weight:700;color:#374151">Códigos identificados en campo</span>
            ${codPreview}
          </div>
          <span style="font-size:13px;color:#9CA3AF">${codsOpen?"▲":"▼"}</span>
        </div>
        ${codsBodyHTML}
      </div>

      <div class="mb14">
        <label class="lbl" style="color:#1A1A1A">Condición operacional</label>
        <div class="selector">${selectorHTML("cond_operacional",OPCIONES.cond_operacional,item.cond_operacional,item.id)}</div>
      </div>

      ${[
        {key:"condicion",   label:"Condición general"},
        {key:"fugas",       label:"Fugas / Estanqueidad"},
        {key:"integridad",  label:"Corrosión / Integridad"},
        {key:"componentes", label:"Estado componentes"},
        {key:"area",        label:"Limpieza / Área"},
        {key:"operacion",   label:"Operación observable"},
      ].map(({key,label})=>`
        <div class="mb12">
          <label class="lbl">${label}</label>
          <div class="selector">${selectorHTML(key,OPCIONES[key],item[key],item.id)}</div>
        </div>`).join("")}

      <div class="mb12">
        <label class="lbl">Observaciones adicionales</label>
        <textarea class="inp" rows="2" placeholder="Detalle adicional del supervisor..."
          oninput="setItemField('${item.id}','observaciones',this.value)">${item.observaciones||""}</textarea>
      </div>

      ${desc ? `
      <div class="desc-auto">
        <div class="lbl2">📝 DESCRIPCIÓN AUTOMÁTICA</div>
        <p>${desc}</p>
        ${item.observaciones?`<p style="margin-top:4px">Observación: ${item.observaciones}</p>`:""}
      </div>` : ""}

      <div class="estado-box" style="background:${r.color}15;border:1px solid ${r.color}50">
        <div>
          <div class="estado-lbl" style="color:${r.color}">ESTADO SUGERIDO</div>
          <div class="estado-val" style="color:${r.color}">${r.estado}</div>
        </div>
        <div class="estado-concl">${r.conclusion}</div>
      </div>

      <button class="btn-del" onclick="eliminarItem('${item.id}')">🗑 Eliminar equipo</button>
    </div>
  </div>`;
}

function renderCards() {
  const container = document.getElementById("cards-container");
  container.innerHTML = STATE.items.map((it,i) => cardHTML(it,i)).join("");
}

function renderResumen() {
  const total = STATE.items.filter(it => it.tipo).length;
  const stats = {};
  STATE.items.forEach(it => {
    if (!it.tipo) return;
    const r = calcularEstado(it);
    stats[r.estado] = (stats[r.estado]||0) + 1;
  });

  let html = `<div style="font-size:13px;color:#6B7280;margin-bottom:12px">${total} equipo(s) registrado(s) · ${STATE.meta.fecha}</div>`;

  Object.entries(COLORES_ESTADO).forEach(([estado, color]) => {
    const count = stats[estado] || 0;
    if (!count) return;
    html += `<div class="resumen-stat" style="border:2px solid ${color}">
      <span style="font-weight:600;color:${color};font-size:14px">${estado}</span>
      <span class="resumen-badge" style="background:${color}">${count}</span>
    </div>`;
  });

  if (total > 0) {
    html += `<div class="hallazgos-title">DETALLE DE HALLAZGOS</div>`;
    STATE.items.filter(it => it.tipo).forEach((it, i) => {
      const r = calcularEstado(it);
      const desc = generarDescripcion(it);
      html += `<div class="hallazgo-item" style="border-left:4px solid ${r.color}">
        <div style="font-weight:700;color:#1A1A1A">${i+1}. ${it.tipo}${it.ubicacion?` · ${it.ubicacion}`:""}</div>
        <div style="color:${r.color};font-weight:600;font-size:12px;margin-top:2px">${r.estado}</div>
        <div style="color:#4B5563;margin-top:3px">${desc}</div>
        ${it.observaciones?`<div style="color:#6B7280;margin-top:2px;font-style:italic">Obs: ${it.observaciones}</div>`:""}
      </div>`;
    });
  }

  document.getElementById("view-resumen").innerHTML = html;
}

// ─────────────────────────────────────────────
// ACCIONES
// ─────────────────────────────────────────────
function toggleCard(id) {
  const body = document.getElementById(`body-${id}`);
  if (!body) return;
  const visible = body.style.display !== "none";
  body.style.display = visible ? "none" : "block";
  const card = document.getElementById(`card-${id}`);
  const chev = card.querySelector(".card-chevron");
  if (chev) chev.textContent = visible ? "▼" : "▲";
}

function toggleCods(id) {
  const item = STATE.items.find(it => it.id == id);
  if (!item) return;
  item._codsOpen = !item._codsOpen;
  guardarEstado();
  renderCardSolo(item, STATE.items.indexOf(item));
}

function toggleSinCodigo(id) {
  const item = STATE.items.find(it => it.id == id);
  if (!item) return;
  item.sin_codigo = !item.sin_codigo;
  if (item.sin_codigo) {
    item.cod_tag = ""; item.cod_perupetro = ""; item.cod_petroperu = "";
    item.cod_savia2022 = ""; item.cod_savia2023 = "";
  }
  guardarEstado();
  renderCardSolo(item, STATE.items.indexOf(item));
}

function setItemField(id, campo, valor) {
  const item = STATE.items.find(it => it.id == id);
  if (!item) return;
  item[campo] = valor;
  guardarEstado();
  // Re-render solo el card para no perder foco en inputs de texto
  const needsFullRender = ["tipo","cond_operacional","condicion","fugas","integridad","componentes","area","operacion"].includes(campo);
  if (needsFullRender) {
    renderCardSolo(item, STATE.items.indexOf(item));
    actualizarTabs();
    actualizarExport();
    if (vistaActual === "resumen") renderResumen();
  }
}

function renderCardSolo(item, idx) {
  const el = document.getElementById(`card-${item.id}`);
  if (!el) return;
  const wasOpen = document.getElementById(`body-${item.id}`)?.style.display !== "none";
  el.outerHTML = cardHTML(item, idx);
  // Restaurar estado open/closed
  const newBody = document.getElementById(`body-${item.id}`);
  if (newBody && !wasOpen) newBody.style.display = "none";
}

function eliminarItem(id) {
  if (STATE.items.length <= 1) {
    // No eliminar el último, limpiar en cambio
    STATE.items[0] = nuevoItem();
  } else {
    STATE.items = STATE.items.filter(it => it.id != id);
  }
  guardarEstado();
  renderCards();
  renderResumen();
  actualizarTabs();
  actualizarExport();
}

function agregarItem() {
  STATE.items.push(nuevoItem());
  guardarEstado();
  renderCards();
  actualizarTabs();
  actualizarExport();
  // Scroll al nuevo card
  setTimeout(() => {
    const cards = document.querySelectorAll(".equipo-card");
    if (cards.length) cards[cards.length-1].scrollIntoView({behavior:"smooth", block:"start"});
  }, 50);
}

// ─────────────────────────────────────────────
// TABS
// ─────────────────────────────────────────────
function setTab(tab) {
  vistaActual = tab;
  document.getElementById("view-formulario").style.display = tab === "formulario" ? "" : "none";
  document.getElementById("view-resumen").style.display    = tab === "resumen"    ? "" : "none";
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  if (tab === "resumen") renderResumen();
}

// ─────────────────────────────────────────────
// EXPORTAR CSV
// ─────────────────────────────────────────────
function exportarCSV() {
  const m = STATE.meta;
  const hdr = ["N°","Tipo","Ubicación","Cond. Operacional","TAG Manual","Cód. PERUPETRO","Cód. PETROPERÚ","Cód. SAVIA 2022","Cód. SAVIA 2023","Sin código","Condición","Fugas","Integridad","Componentes","Área","Operación","Estado","Conclusión","Descripción automática","Observaciones"];
  const rows = STATE.items.map((it,i) => {
    const r = calcularEstado(it);
    return [
      i+1, it.tipo, it.ubicacion, it.cond_operacional,
      it.cod_tag, it.cod_perupetro, it.cod_petroperu, it.cod_savia2022, it.cod_savia2023,
      it.sin_codigo ? "Sin códigos identificados" : "",
      it.condicion, it.fugas, it.integridad, it.componentes, it.area, it.operacion,
      r.estado, r.conclusion, generarDescripcion(it), it.observaciones
    ].map(v => `"${(v??'').toString().replace(/"/g,'""')}"`).join(",");
  });
  const meta = [
    `"INFORME DE INSPECCIÓN VISUAL – PERUPETRO S.A. – GFST-SUPC"`,
    `"Fecha:","${m.fecha}"`,
    `"Inspector:","${m.inspector}"`,
    `"Lote / Área:","${m.lote}"`,
    `""`,
  ].join("\n");
  const csv = "\uFEFF" + meta + "\n" + hdr.map(h=>`"${h}"`).join(",") + "\n" + rows.join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `Inspeccion_${m.lote||"Activos"}_${m.fecha}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ─────────────────────────────────────────────
// EVENT LISTENERS
// ─────────────────────────────────────────────
document.getElementById("btn-add").addEventListener("click", agregarItem);
document.getElementById("btn-export").addEventListener("click", exportarCSV);
document.querySelectorAll(".tab-btn").forEach(b => b.addEventListener("click", () => setTab(b.dataset.tab)));

["meta-fecha","meta-lote","meta-inspector"].forEach(id => {
  document.getElementById(id).addEventListener("input", e => {
    const campo = id.replace("meta-","");
    STATE.meta[campo] = e.target.value;
    guardarEstado();
    if (vistaActual === "resumen") renderResumen();
  });
});

// ─────────────────────────────────────────────
// PWA – SERVICE WORKER
// ─────────────────────────────────────────────
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(() => {});
}

// ─────────────────────────────────────────────
// INSTALL PROMPT (Android Chrome)
// ─────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById("install-banner");
  banner.style.display = "flex";
});
document.getElementById("install-btn").addEventListener("click", () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById("install-banner").style.display = "none";
    });
  }
});
document.getElementById("dismiss-install").addEventListener("click", () => {
  document.getElementById("install-banner").style.display = "none";
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
cargarEstado();
renderAll();
document.getElementById("save-indicator").textContent = "Datos cargados desde dispositivo";
document.getElementById("save-indicator").className = "saved";
</script>
